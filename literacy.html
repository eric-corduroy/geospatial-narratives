<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geospatial Literacy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=filter_list" />
  <link rel="icon" type="image/png" href="circle.png">
  <style>
    /* ============================================================
       COLOR TOKENS
    ============================================================ */
    :root {
      --color-accent:             #f5ffaa;
      --color-accent-hover:       #a7b060;
      --color-accent-link:        #a7b060;
      --color-tba:                #cccccc;
      --color-black:              #000000;
      --color-white:              #ffffff;
      --color-bg:                 #f2f2f2;
      --color-nav-bg:             #f5ffaa;
      --color-table-bg:           #ffffff;
      --color-text-primary:       #000000;
      --color-text-muted:         #9f9e9e;
      --color-text-faint:         #9f9e9e;
      --color-text-light:         #555555;
      --color-text-link:          #997b21;
      --color-text-filter-title:  #666666;
      --color-border-strong:      #9f9e9e;
      --color-border-light:       #D3D3D3;
      --color-border-mid:         rgba(0, 0, 0, 0.15);
      --color-border-card:        #eeeeee;
      --color-pill-border:        #999999;
      --color-pill-active-bg:     #000000;
      --color-pill-active-text:   #ffffff;
      --color-pill-hover:         rgba(0, 0, 0, 0.1);
      --color-toggle-inactive:    #d3d2d2;
      --color-toggle-active:      #131313;
      --color-toggle-knob:        #f2f2f2;
      --color-filter-bg:          #e6e6e6;
      --color-thead-bg:           #131313;
      --color-thead-text:         #ffffff;
      --color-selection-bg:       #f5ffaa;
      --color-selection-text:     #000000;
      --color-term-tba:           #cccccc;
    }
    /* ============================================================
       RESET / BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }
    ::selection {
      background: var(--color-selection-bg);
      color: var(--color-selection-text);
    }
    body {
      font-family: 'Geist Mono', monospace;
      background: var(--color-bg);
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
      text-rendering: optimizeLegibility;
    }
    a {
      color: var(--color-text-link);
      text-decoration: none;
      border-bottom: none;
    }
    /* ============================================================
       NAVIGATION
    ============================================================ */
    .nav {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 3px 40px 3px 20px;
      font-size: 17.5px;
      font-weight: 450;
      color: var(--color-text-primary);
      gap: 10px;
      background: var(--color-nav-bg);
    }
    .nav a {
      font-size: 17.5px;
      font-weight: 450;
      color: var(--color-accent-link);
      border-bottom: none;
      padding: 5px 10px;
    }
    .nav a:hover  { color: var(--color-text-primary); }
    .nav a.active { color: var(--color-text-primary); }
    /* ============================================================
       HEADER AREA
    ============================================================ */
    .update-date {
      font-family: 'Geist Mono', monospace;
      font-size: 15px;
      font-weight: 300;
      color: var(--color-text-muted);
      padding: 10px 0 0 29px;
    }
    .stats {
      font-size: 96px;
      font-weight: 400;
      padding: 10px 0 10px 20px;
      color: var(--color-text-primary);
    }
    .article-count-number { margin-left: 30px; }
    sup .article-count-number { margin-left: 1px; }
    /* ============================================================
       TOGGLES
    ============================================================ */
    .toggles-container {
      background: var(--color-bg);
      padding: 0 40px 10px 20px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 20px;
      margin-top: 10px;
    }
    .filter-toggle-group,
    .view-toggle-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .filter-toggle-label,
    .view-toggle-label {
      font-size: 18px;
      font-weight: 500;
      color: var(--color-text-primary);
    }
    /* ============================================================
       SWITCH
    ============================================================ */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: var(--color-toggle-inactive);
      transition: 0.4s;
      border-radius: 24px;
    }
    .slider::before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: var(--color-toggle-knob);
      transition: 0.4s;
      border-radius: 50%;
    }
    input:checked + .slider         { background-color: var(--color-toggle-active); }
    input:focus  + .slider          { box-shadow: 0 0 1px var(--color-toggle-active); }
    input:checked + .slider::before { transform: translateX(16px); }
    /* ============================================================
       FILTERS
    ============================================================ */
    .filter-container {
      padding: 0;
      background: var(--color-bg);
    }
    .filter-group {
      background: var(--color-white);
      border: none;
      border-radius: 0;
      margin-bottom: 0;
      overflow: hidden;
    }
    .filter-group:not(:first-child) {
      border-top: 1px solid var(--color-border-strong);
    }
    .filter-group-header {
      padding: 5px 20px;
      font-size: 18px;
      font-weight: 500;
      background: var(--color-filter-bg);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--color-text-faint);
    }
    body.filters-active .filter-group-header {
      color: var(--color-text-primary);
    }
    /* Base state — fast collapse */
    .filter-group-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.15s ease-in;
      padding: 0 20px;
      background-color: var(--color-filter-bg);
    }
    /* Active state — normal expand */
    .filter-group.active .filter-group-content {
      max-height: 600px;
      padding-bottom: 4px;
      transition: max-height 0.25s ease-out;
    }
    .filter-title {
      font-size: 13px;
      font-weight: 400;
      margin-top: 3px;
      margin-bottom: 3px;
      color: var(--color-text-filter-title);
    }
    .filter-group-content .filter-title:first-of-type { margin-top: 0; }
    .filter-pills {
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      overflow-x: auto;
      padding-bottom: 5px;
      -webkit-overflow-scrolling: touch;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .filter-pills::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 16px;
      border: 1px solid var(--color-pill-border);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
      color: var(--color-text-primary);
    }
    .pill:hover  { background: var(--color-pill-hover); }
    .pill.active {
      background: var(--color-pill-active-bg);
      color: var(--color-pill-active-text);
      border-color: var(--color-pill-active-bg);
    }
    .year-range-filter {
      display: flex;
      gap: 10px;
      margin-top: 3px;
      margin-bottom: 7px;
      align-items: center;
    }
    .year-range-filter input[type="number"] {
      padding: 5.5px 10px;
      border: 1px solid var(--color-pill-border);
      background: transparent;
      border-radius: 10px;
      font-size: 13px;
      width: 80px;
      color: var(--color-text-primary);
    }
    /* ============================================================
       LINK PILL  — matches index.html exactly
    ============================================================ */
    .link-pill a {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      background: var(--color-accent);
      color: var(--color-text-primary);
      text-decoration: none;
      font-weight: 500;
      font-size: 11px;
      border: none;
      transition: background 0.2s ease;
    }
    .link-pill a:hover { background: var(--color-accent-hover); }
    /* ============================================================
       TABLE HEADER ROW (outside table, fixed)
    ============================================================ */
    .table-header-row {
      display: flex;
      width: 100%;
      background: var(--color-thead-bg);
      color: var(--color-thead-text);
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 1px solid var(--color-border-strong);
      flex-shrink: 0;
      overflow: hidden;
    }
    .table-header-row.hidden { display: none; }
    .th {
      padding: 4px 12px;
      word-wrap: break-word;
      flex-shrink: 0;
      overflow: hidden;
    }
    /* Column widths — must match td widths below */
    .th:nth-child(1) { width: 4%;  }
    .th:nth-child(2) { width: 20%; }
    .th:nth-child(3) { width: 5%;  }
    .th:nth-child(4) { width: 12%; }
    .th:nth-child(5) { width: 12%; }
    .th:nth-child(6) { width: 10%; }
    .th:nth-child(7) { width: 8%;  }
    /* ============================================================
       TABLE VIEW
    ============================================================ */
    .table-view-container {
      margin: 0;
      flex-grow: 1;
      overflow-y: auto;
      position: relative;
      background: var(--color-bg);
      padding-bottom: 50px;
    }
    .quote-only-view-container,
    .terms-view-container {
      margin: 0;
      flex-grow: 1;
      overflow-y: auto;
      position: relative;
      background: var(--color-bg);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--color-white);
      table-layout: fixed;
    }
    td {
      text-align: left;
      padding: 4px 12px;
      border-bottom: 1px solid var(--color-border-strong);
      border-top: 1px solid var(--color-border-strong);
      font-family: 'Geist Mono', monospace;
      vertical-align: top;
      font-size: 13px;
      font-weight: 400;
      word-wrap: break-word;
    }
    /* Column widths — must match .th widths above */
    td:nth-child(1) { width: 4%;  min-width: 4%;  max-width: 4%;  }
    td:nth-child(2) { width: 20%; min-width: 20%; max-width: 20%; }
    td:nth-child(3) { width: 5%;  min-width: 5%;  max-width: 5%;  }
    td:nth-child(4) { width: 12%; min-width: 12%; max-width: 12%; }
    td:nth-child(5) { width: 12%; min-width: 12%; max-width: 12%; }
    td:nth-child(6) { width: 10%; min-width: 10%; max-width: 10%; }
    td:nth-child(7) { width: 8%;  min-width: 8%;  max-width: 8%;  }
    /* Quote column hidden */
    td:nth-child(8) { display: none; }
    .month { color: gray; }
    /* ============================================================
       QUOTE-ONLY VIEW
    ============================================================ */
    .quote-only-view-container {
      padding: 20px 40px 50px;
      background: var(--color-table-bg);
      border-top: 1px solid var(--color-border-strong);
    }
    .quote-only-view-container .literature-quote-item {
      font-size: 80px;
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.2;
      color: var(--color-text-primary);
      border-bottom: 1px solid var(--color-border-card);
      padding-bottom: 15px;
      cursor: default;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      text-decoration: none;
      text-transform: uppercase;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      font-family: 'Geist', sans-serif;
      text-rendering: geometricPrecision;
    }
    .quote-only-view-container .literature-quote-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }
    .quote-only-view-container .literature-quote-item a {
      color: inherit;
      text-decoration: none;
    }
    .quote-author {
      font-size: 14px;
      font-weight: 350;
      color: var(--color-text-light);
      margin-top: 5px;
      text-align: left;
      text-transform: none;
      padding-left: 10px;
      font-family: 'Geist Mono', monospace;
    }
    /* ============================================================
       TERMS / GLOSSARY VIEW
    ============================================================ */
    .terms-view-container {
      padding: 20px 40px 50px;
      background: var(--color-table-bg);
      border-top: 1px solid var(--color-border-strong);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .terms-view-container .term-column {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .terms-view-container .term-letter {
      font-size: 18px;
      font-weight: 400;
      color: var(--color-text-primary);
      margin-bottom: 0;
      margin-top: 20px;
      text-transform: uppercase;
      border-bottom: none;
      padding-bottom: 0;
    }
    .terms-view-container .term-item {
      font-size: 44px;
      line-height: 1.1;
      color: var(--color-text-primary);
      margin-top: 10px;
      cursor: pointer;
    }
    .terms-view-container .tba-term {
      color: var(--color-term-tba);
      cursor: default;
    }
    .term-definition {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      line-height: 1.2;
      color: #333;
      margin-top: 5px;
      margin-bottom: 15px;
      padding: 2px;
      background-color: var(--color-white);
      border-radius: 4px;
      display: none;
      word-break: break-word;
    }
    .term-definition.active { display: block; }
    /* ============================================================
       SHOW / HIDE UTILITIES
    ============================================================ */
    .table-view-container.hidden,
    .quote-only-view-container.hidden,
    .terms-view-container.hidden { display: none; }
    /* ============================================================
       OVERLAY
    ============================================================ */
    .overlay {
      position: fixed;
      inset: 0;
      background-color: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      font-size: 10em;
      font-weight: bold;
      color: #333;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }
    .overlay.hidden { opacity: 0; visibility: hidden; }
    /* ============================================================
       MATERIAL SYMBOLS
    ============================================================ */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* ============================================================
       MOBILE DISCLAIMER
    ============================================================ */
    .mobile-disclaimer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .mobile-disclaimer.visible { display: flex; }
    .mobile-disclaimer-box {
      background: var(--color-accent);
      border-radius: 10px;
      padding: 15px;
      width: 80%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 -4px 40px rgba(0, 0, 0, 0.25);
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .mobile-disclaimer-text {
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: var(--color-text-primary);
      margin: 0;
      line-height: 1.2;
    }
    .mobile-disclaimer-btn {
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-white);
      background: var(--color-black);
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s ease;
    }
    .mobile-disclaimer-btn:hover { background: var(--color-border-strong); }
    /* ============================================================
       RESPONSIVE — ≤ 1268px (tablets)
    ============================================================ */
    @media (max-width: 1268px) {
      .nav { padding: 15px 20px 15px 15px; font-size: 18px; gap: 5px; }
      .nav a { font-size: 18px; padding: 3px 8px; }
      .stats { font-size: 60px; padding: 15px 20px 5px 20px; }
      .toggles-container { padding: 0 20px 10px 15px; gap: 15px; }
      .filter-toggle-label, .view-toggle-label { font-size: 16px; }
      .filter-group-header { font-size: 16px; padding: 6px 15px; }
      .filter-group-content { padding: 0 15px; }
      .filter-title { font-size: 12px; }
      .pill { font-size: 12px; padding: 5px 10px; }
      .year-range-filter input[type="number"] { font-size: 12px; width: 60px; }
      td { font-size: 12px; padding: 6px 8px; }
      .table-header-row { font-size: 12px; }
      .link-pill a { font-size: 12px; }
      .overlay { font-size: 7em; }
      .quote-only-view-container { padding: 15px 20px 50px; }
      .quote-only-view-container .literature-quote-item {
        font-size: 40px;
        margin-bottom: 15px;
        padding-bottom: 10px;
      }
      .quote-author { font-size: 12px; margin-top: 8px; padding-left: 8px; }
      .terms-view-container {
        padding: 15px 20px 50px;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .terms-view-container .term-letter { font-size: 16px; }
      .terms-view-container .term-item   { font-size: 36px; }
      .term-definition                   { font-size: 12px; }
    }
    /* ============================================================
       RESPONSIVE — ≤ 480px (mobile)
    ============================================================ */
    @media (max-width: 480px) {
  .nav { padding: 5px 20px 5px 5px; font-size: 18px; gap: 5px; }
  .nav a { font-size: 17px; padding: 2px 8px; }
  .update-date { font-size: 12px; padding: 10px 0 0 13px; }
  .stats { font-size: 46px; padding: 10px 12px 10px 10px; }
  .toggles-container { padding: 0 20px 10px 12px; flex-wrap: wrap; gap: 15px; }
  .filter-toggle-label, .view-toggle-label { font-size: 16px; }
  .filter-group-header { font-size: 16px; padding: 4.5px 15px; }
  .filter-group-content { padding: 0 10px; }
  .filter-title { font-size: 11.5px; margin-top: 2px; margin-bottom: 3px; }
  .pill { font-size: 12px; padding: 4px 10px; }
  .year-range-filter input[type="number"] { font-size: 12px; width: 60px; padding: 4px 10px; }
  /* Hide columns from 4th onwards */
  td:nth-child(n+4)  { display: none; }
  .th:nth-child(n+4) { display: none; }
  td:nth-child(1)  { width: 15%;   min-width: 15%;   max-width: 15%;   }
  td:nth-child(2)  { width: 60%;   min-width: 60%;   max-width: 60%;   }
  td:nth-child(3)  { width: 25%;   min-width: 25%;   max-width: 25%;   }
  .th:nth-child(1) { width: 15%; }
  .th:nth-child(2) { width: 60%; }
  .th:nth-child(3) { width: 25%; }
  td { font-size: 12px; line-height: 1.3; padding: 5.5px 8px; } /* ← fixed */
  .table-header-row { font-size: 12px; margin-bottom: none; padding-bottom: none; }                         /* ← fixed */
  .link-pill a {
    display: inline-block;
    padding: 4px 8px;
    margin-left: -7px;
    border-radius: 12px;
    background: var(--color-accent);
    color: var(--color-text-primary);
    text-decoration: none;
    font-weight: 500;
    font-size: 11px;
    border: none;
    transition: background 0.2s ease;
  }
  .link-pill a:hover { background: var(--color-accent-hover); }
  .overlay { font-size: 4em; }
  .quote-only-view-container { padding: 10px 15px 50px; }
  .quote-only-view-container .literature-quote-item {
    font-size: 23px;
    letter-spacing: -0.025em;
    line-height: 1.3;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: none;
  }
  .quote-author {
    font-size: 11px;
    margin-top: 2px;
    padding-top: 4px;
    padding-left: 1px;
    border-top: 1px solid var(--color-border-light);
  }
  .terms-view-container {
    padding: 10px 15px 50px;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .terms-view-container .term-letter { font-size: 14px; }
  .terms-view-container .term-item   { font-size: 28px; }
  .term-definition                   { font-size: 12px; }
  .article-count-number { margin-left: 8px; }
  sup .article-count-number {
    margin-left: 0;
    font-size: 75%;
    position: relative;
    top: -0.2em;
  }
}
  </style>
</head>
<body>
  <!-- ============================================================
       MOBILE DISCLAIMER OVERLAY
  ============================================================ -->
  <div id="mobileDisclaimer" class="mobile-disclaimer">
    <div class="mobile-disclaimer-box">
      <p class="mobile-disclaimer-text">
        This site is best viewed on a desktop screen.
      </p>
      <button id="mobileDisclaimerClose" class="mobile-disclaimer-btn">
        Continue anyway
      </button>
    </div>
  </div>
  <!-- ============================================================
       FIXED HEADER
  ============================================================ -->
  <div id="fixed-header-area">
    <div class="nav">
      <a href="index.html">Index</a>
      <a href="literacy.html" class="active">Literacy</a>
      <a href="about.html">About</a>
    </div>
    <div class="update-date">updated: 2025-09-17</div>
    <div class="stats">
      <span id="loadingStatus">Loading data...</span>
      <div id="statsDisplay" style="display: none;"></div>
    </div>
    <div class="toggles-container">
      <div class="filter-toggle-group">
        <span class="filter-toggle-label">
          <span class="material-symbols-outlined">filter_list</span>
        </span>
        <label class="switch">
          <input type="checkbox" id="filterToggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="view-toggle-group">
        <span class="view-toggle-label">QUOTES</span>
        <label class="switch">
          <input type="checkbox" id="quotesToggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="view-toggle-group">
        <span class="view-toggle-label">GLOSSARY</span>
        <label class="switch">
          <input type="checkbox" id="termsToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="filter-container">
      <!-- LITERATURE -->
      <div class="filter-group" id="literature-group">
        <div class="filter-group-header">LITERATURE</div>
        <div class="filter-group-content">
          <div class="filter-title">Publication Year Range:</div>
          <div class="year-range-filter">
            <button class="pill active" data-type="publicationYear" data-value="all">All</button>
            <input type="number" id="fromYearInput" placeholder="Year">
            <input type="number" id="toYearInput"   placeholder="Year">
          </div>
          <div class="filter-title">Category:</div>
          <div class="filter-pills" id="category-filter-pills">
            <button class="pill active" data-type="category" data-value="all">All</button>
          </div>
          <div class="filter-title">Media Type:</div>
          <div class="filter-pills" id="type-filter-pills">
            <button class="pill active" data-type="type" data-value="all">All</button>
          </div>
        </div>
      </div>
      <!-- GLOSSARY -->
      <div class="filter-group" id="terms-filter-group">
        <div class="filter-group-header">GLOSSARY</div>
        <div class="filter-group-content">
          <div class="filter-title">Meaning Type:</div>
          <div class="filter-pills" id="meaning-type-filter-pills">
            <button class="pill active" data-type="meaning-type" data-value="all">All</button>
            <button class="pill" data-type="meaning-type" data-value="technical/scientific">Technical/Scientific</button>
            <button class="pill" data-type="meaning-type" data-value="media theoretical/philosophical">Media Theoretical/Philosophical</button>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /fixed-header-area -->
  <!-- ============================================================
       TABLE COLUMN HEADER (outside table, fixed)
  ============================================================ -->
  <div id="tableHeader" class="table-header-row">
    <div class="th">Year</div>
    <div class="th">Title</div>
    <div class="th">Link</div>
    <div class="th">Author</div>
    <div class="th">Publisher</div>
    <div class="th">Category</div>
    <div class="th">Type</div>
  </div>
  <!-- ============================================================
       TABLE VIEW
  ============================================================ -->
  <div id="tableViewContainer" class="table-view-container">
    <table>
      <tbody></tbody>
    </table>
  </div>
  <!-- ============================================================
       QUOTE-ONLY VIEW
  ============================================================ -->
  <div id="quoteOnlyViewContainer" class="quote-only-view-container hidden"></div>
  <!-- ============================================================
       GLOSSARY / TERMS VIEW
  ============================================================ -->
  <div id="termsViewContainer" class="terms-view-container hidden"></div>
  <!-- ============================================================
       SCRIPTS
  ============================================================ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <script>
    /* ----------------------------------------------------------
       STATE
    ---------------------------------------------------------- */
    let allData      = [];
    let termsData    = {};
    let filtersActive = false;
    let currentView  = 'table';
    let currentOpenDefinitionElement = null;
    let termToActivateOnRender       = null;

    const viewMap = {
      'quotes'  : 'quote',
      'glossary': 'terms',
      'table'   : 'table'
    };
    /* ----------------------------------------------------------
       UTILITIES
    ---------------------------------------------------------- */
    function slugify(text) {
      if (!text) return '';
      return text.toString().toLowerCase()
        .replace(/\s+/g, '_')
        .replace(/[^\w\-]+/g, '')
        .replace(/\-\-+/g, '_')
        .replace(/^[-_]+/, '')
        .replace(/[-_]+$/, '');
    }
    /* ----------------------------------------------------------
       LAYOUT HEIGHT
    ---------------------------------------------------------- */
    function adjustContentViewHeight() {
      const fixedHeader            = document.getElementById('fixed-header-area');
      const tableHeader            = document.getElementById('tableHeader');
      const tableViewContainer     = document.getElementById('tableViewContainer');
      const quoteOnlyViewContainer = document.getElementById('quoteOnlyViewContainer');
      const termsViewContainer     = document.getElementById('termsViewContainer');
      if (!fixedHeader) return;
      const tableHeaderHeight = (tableHeader && !tableHeader.classList.contains('hidden'))
        ? tableHeader.offsetHeight : 0;
      const remaining      = `calc(100vh - ${fixedHeader.offsetHeight}px - ${tableHeaderHeight}px)`;
      const otherRemaining = `calc(100vh - ${fixedHeader.offsetHeight}px)`;
      if (tableViewContainer)     tableViewContainer.style.height     = remaining;
      if (quoteOnlyViewContainer) quoteOnlyViewContainer.style.height = otherRemaining;
      if (termsViewContainer)     termsViewContainer.style.height     = otherRemaining;
    }
    /* ----------------------------------------------------------
       COLUMN WIDTH SYNC
    ---------------------------------------------------------- */
    function syncTableHeaderWidths() {
      const table       = document.querySelector('table');
      const thDivs      = document.querySelectorAll('.table-header-row .th');
      const tableHeader = document.getElementById('tableHeader');
      if (!table || !thDivs.length || !tableHeader) return;
      tableHeader.style.width     = '';
      tableHeader.style.transform = '';
      thDivs.forEach(th => {
        th.style.width = th.style.minWidth = th.style.maxWidth = '';
      });
      const firstRow = table.querySelector('tbody tr');
      if (!firstRow) return;
      const cells        = Array.from(firstRow.querySelectorAll('td'));
      const visibleThs   = Array.from(thDivs).filter(
        th => window.getComputedStyle(th).display !== 'none'
      );
      const visibleCells = cells.filter(
        td => window.getComputedStyle(td).display !== 'none'
      );
      thDivs.forEach(th => {
        if (window.getComputedStyle(th).display === 'none') {
          th.style.width = th.style.minWidth = th.style.maxWidth = '0';
        }
      });
      visibleThs.forEach((th, i) => {
        const cell = visibleCells[i];
        if (!cell) return;
        const w = cell.getBoundingClientRect().width;
        if (w > 0) th.style.width = th.style.minWidth = th.style.maxWidth = `${w}px`;
      });
      const tableWidth = table.getBoundingClientRect().width;
      if (tableWidth > 0) tableHeader.style.width = `${tableWidth}px`;
      const vw = window.innerWidth;
      if (vw <= 480 || vw <= 1268) {
        const offset = 4;
        tableHeader.style.transform = `translateX(-${offset}px)`;
        tableHeader.style.width     = `calc(${tableWidth}px + ${offset}px)`;
      } else {
        tableHeader.style.transform = 'translateX(0)';
        tableHeader.style.width     = `${tableWidth}px`;
      }
    }
    /* ----------------------------------------------------------
       DEFINITION TEXT FORMATTER
    ---------------------------------------------------------- */
    function formatDefinitionText(text, maxCharsPerLine) {
      if (!text) return '';
      const words = text.split(' ');
      let lines = [], currentLine = [], currentLineLength = 0;
      words.forEach(word => {
        if (currentLineLength + (currentLine.length > 0 ? 1 : 0) + word.length > maxCharsPerLine
            && currentLine.length > 0) {
          lines.push(currentLine.join(' '));
          currentLine       = [word];
          currentLineLength = word.length;
        } else {
          currentLine.push(word);
          currentLineLength += (currentLine.length > 1 ? 1 : 0) + word.length;
        }
      });
      lines.push(currentLine.join(' '));
      return lines.join('<br>');
    }
    /* ----------------------------------------------------------
       HASH ROUTING
    ---------------------------------------------------------- */
    function getInitialViewFromHash() {
      const hash = window.location.hash.substring(1).toLowerCase();
      termToActivateOnRender = null;
      if (hash.startsWith('glossary_')) {
        termToActivateOnRender = hash.substring('glossary_'.length);
        return 'terms';
      }
      if (hash === 'quotes')   return 'quote';
      if (hash === 'glossary') return 'terms';
      return 'table';
    }
    function updateHash(viewName, termSlug = null) {
      let newHash = '';
      if (viewName === 'quote') newHash = '#quotes';
      if (viewName === 'terms') newHash = termSlug ? `#glossary_${termSlug}` : '#glossary';
      if (window.location.hash.toLowerCase() !== newHash.toLowerCase()) {
        history.replaceState(null, null, newHash || ' ');
      }
    }
    function updateViewFromHash(hash) {
      let view = viewMap[hash] || 'table';
      let termSlug = null;
      if (hash.startsWith('glossary_')) { view = 'terms'; termSlug = hash.substring('glossary_'.length); }
      if (hash === 'glossary') { view = 'terms'; termSlug = null; }
      currentView = view;
      document.getElementById('quotesToggle').checked = (view === 'quote');
      document.getElementById('termsToggle').checked  = (view === 'terms');
      termToActivateOnRender = (view === 'terms') ? termSlug : null;
      updateView(false);
    }
    /* ----------------------------------------------------------
       TERM ACTIVATION
    ---------------------------------------------------------- */
    function handleTermActivation(clickedTermElement, termItem) {
      const termSlug = slugify(termItem.term);
      if (currentOpenDefinitionElement &&
          currentOpenDefinitionElement.previousElementSibling === clickedTermElement) {
        currentOpenDefinitionElement.remove();
        currentOpenDefinitionElement = null;
        updateHash('terms', null);
        return;
      }
      if (currentOpenDefinitionElement) {
        currentOpenDefinitionElement.remove();
        currentOpenDefinitionElement = null;
      }
      if (termItem.definition) {
        const formatted    = formatDefinitionText(termItem.definition, 33);
        const definitionEl = document.createElement('div');
        definitionEl.classList.add('term-definition', 'active');
        definitionEl.innerHTML = formatted;
        clickedTermElement.parentNode.insertBefore(definitionEl, clickedTermElement.nextSibling);
        currentOpenDefinitionElement = definitionEl;
        updateHash('terms', termSlug);
        clickedTermElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
    /* ----------------------------------------------------------
       VIEW SWITCHING
    ---------------------------------------------------------- */
    function updateView(updateHashState = true) {
      const tableViewContainer     = document.getElementById('tableViewContainer');
      const quoteOnlyViewContainer = document.getElementById('quoteOnlyViewContainer');
      const termsViewContainer     = document.getElementById('termsViewContainer');
      const tableHeader            = document.getElementById('tableHeader');
      if (updateHashState) updateHash(currentView);
      tableViewContainer.classList.add('hidden');
      quoteOnlyViewContainer.classList.add('hidden');
      termsViewContainer.classList.add('hidden');
      if (currentView === 'table') {
        tableViewContainer.classList.remove('hidden');
        if (tableHeader) tableHeader.classList.remove('hidden');
      } else {
        if (tableHeader) tableHeader.classList.add('hidden');
        if (currentView === 'quote') quoteOnlyViewContainer.classList.remove('hidden');
        if (currentView === 'terms') termsViewContainer.classList.remove('hidden');
      }
      filterTable();
      adjustContentViewHeight();
      if (currentView === 'table') requestAnimationFrame(syncTableHeaderWidths);
    }
    /* ----------------------------------------------------------
       INIT
    ---------------------------------------------------------- */
    document.addEventListener('DOMContentLoaded', function () {
      /* ── Mobile disclaimer ── */
      const disclaimer      = document.getElementById('mobileDisclaimer');
      const disclaimerClose = document.getElementById('mobileDisclaimerClose');
      if (window.innerWidth <= 768 && !sessionStorage.getItem('mobileDisclaimerDismissed')) {
        disclaimer.classList.add('visible');
      }
      disclaimerClose.addEventListener('click', function () {
        disclaimer.classList.remove('visible');
        sessionStorage.setItem('mobileDisclaimerDismissed', 'true');
      });
      /* ── Initial hash / view ── */
      currentView = getInitialViewFromHash();
      const quotesToggle = document.getElementById('quotesToggle');
      const termsToggle  = document.getElementById('termsToggle');
      quotesToggle.checked = (currentView === 'quote');
      termsToggle.checked  = (currentView === 'terms');
      const tableHeader = document.getElementById('tableHeader');
      if (currentView !== 'table' && tableHeader) tableHeader.classList.add('hidden');
      /* ── Year range pills ── */
      const yearAllButton = document.querySelector('.pill[data-type="publicationYear"][data-value="all"]');
      const fromYearInput = document.getElementById('fromYearInput');
      const toYearInput   = document.getElementById('toYearInput');
      yearAllButton.addEventListener('click', function () {
        fromYearInput.value = '';
        toYearInput.value   = '';
        yearAllButton.classList.add('active');
        filterTable();
      });
      [fromYearInput, toYearInput].forEach(input => {
        input.addEventListener('input', () => {
          if (fromYearInput.value || toYearInput.value) yearAllButton.classList.remove('active');
          filterTable();
        });
      });
      /* ── Load data ── */
      Promise.all([loadLiteratureData(), loadTermsData()])
        .then(() => {
          initializeFilters();
          updateView(false);
          document.getElementById('loadingStatus').style.display = 'none';
          document.getElementById('statsDisplay').style.display  = 'block';
        })
        .catch(error => {
          console.error('Error loading data:', error);
          document.getElementById('loadingStatus').textContent = 'Error loading data.';
          loadSampleLiteratureData();
          loadSampleTermsData();
          initializeFilters();
          updateView(false);
          document.getElementById('statsDisplay').style.display = 'block';
        });
      /* ── Filter pills ── */
      document.querySelectorAll('.filter-pills .pill').forEach(pill => {
        pill.addEventListener('click', handlePillClick);
      });
      document.getElementById('fromYearInput').addEventListener('input', filterTable);
      document.getElementById('toYearInput').addEventListener('input', filterTable);
      /* ── Filter group headers ── */
      document.querySelectorAll('.filter-group-header').forEach(header => {
        header.addEventListener('click', function () {
          if (filtersActive) {
            this.closest('.filter-group').classList.toggle('active');
            adjustContentViewHeight();
          }
        });
      });
      /* ── Filter toggle ── */
      document.getElementById('filterToggle').addEventListener('change', function () {
        filtersActive = this.checked;
        document.body.classList.toggle('filters-active', filtersActive);
        toggleAllFilters(true);
        filterTable();
      });
      /* ── View toggles ── */
      quotesToggle.addEventListener('change', function () {
        currentView = this.checked ? 'quote' : 'table';
        if (this.checked) termsToggle.checked = false;
        termToActivateOnRender = null;
        updateView();
      });
      termsToggle.addEventListener('change', function () {
        currentView = this.checked ? 'terms' : 'table';
        if (this.checked) quotesToggle.checked = false;
        termToActivateOnRender = null;
        updateView();
      });
      /* ── Hash change ── */
      window.addEventListener('hashchange', () => {
        updateViewFromHash(window.location.hash.substring(1).toLowerCase());
      });
      /* ── Active nav link ── */
      const currentPath = window.location.pathname.split('/').pop();
      document.querySelectorAll('.nav a').forEach(link => {
        link.classList.toggle('active', link.getAttribute('href') === currentPath);
      });
      /* ── Resize & font observers ── */
      adjustContentViewHeight();
      window.addEventListener('resize', () => {
        adjustContentViewHeight();
        requestAnimationFrame(syncTableHeaderWidths);
      });
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(() => requestAnimationFrame(syncTableHeaderWidths));
      }
      const tableEl = document.querySelector('table');
      if (tableEl && window.ResizeObserver) {
        new ResizeObserver(() => requestAnimationFrame(syncTableHeaderWidths)).observe(tableEl);
      }
    });
    /* ----------------------------------------------------------
       DATA LOADING
    ---------------------------------------------------------- */
    async function loadLiteratureData() {
      const response = await fetch('./literacy_data.csv');
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      const csvText = await response.text();
      return new Promise(resolve => {
        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          dynamicTyping: false,
          complete: function (results) {
            allData = results.data.map(row => ({
              year:              row.Year ? parseInt(row.Year) : null,
              title:             row.Title                 || '',
              link:              row.Link                  || '',
              author:            row.Author                || '',
              platformPublisher: row['Platform/Publisher'] || '',
              category:          row.Category              || '',
              type:              row.Type                  || '',
              quote:             row.Quote                 || '',
            })).filter(item => item.year !== null);
            resolve();
          }
        });
      });
    }
    async function loadTermsData() {
      const response = await fetch('./terms.csv');
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      const csvText = await response.text();
      return new Promise(resolve => {
        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          dynamicTyping: false,
          complete: function (results) {
            termsData = {};
            results.data.forEach(row => {
              const term        = row.Term            || '';
              const meaningType = row['Meaning Type'] || '';
              const definition  = row.Definition      || '';
              if (!term) return;
              const letter = term.charAt(0).toUpperCase();
              if (!termsData[letter]) termsData[letter] = [];
              termsData[letter].push({ term, meaningType, definition });
            });
            for (const letter in termsData) {
              termsData[letter].sort((a, b) => a.term.localeCompare(b.term));
            }
            resolve();
          }
        });
      });
    }
    /* ----------------------------------------------------------
       SAMPLE / FALLBACK DATA
    ---------------------------------------------------------- */
    function loadSampleLiteratureData() {
      allData = [
        { year: 2020, title: 'Mapping the Unseen', link: '#', author: 'Dr. Jane Doe',
          platformPublisher: 'Journal of Digital Humanities', category: 'Journalism',
          type: 'Book', quote: 'Geospatial narratives empower readers.' },
        { year: 2023, title: "The Cartographer's Dilemma", link: '#', author: 'Prof. John Smith',
          platformPublisher: 'University Press', category: 'Ethics',
          type: 'Journal Article', quote: 'Every map is a political statement.' }
      ];
    }
    function loadSampleTermsData() {
      const samples = [
        { Term: 'Earth Observation', 'Meaning Type': 'Technical/Scientific',
          Definition: 'Gathering information about Earth by remote sensing technologies.' },
        { Term: 'Geomedia', 'Meaning Type': 'Media Theoretical/Philosophical',
          Definition: 'A hybrid field exploring intersections of geography and media.' }
      ];
      termsData = {};
      samples.forEach(row => {
        const letter = row.Term.charAt(0).toUpperCase();
        if (!termsData[letter]) termsData[letter] = [];
        termsData[letter].push({
          term: row.Term, meaningType: row['Meaning Type'], definition: row.Definition
        });
      });
      for (const letter in termsData) {
        termsData[letter].sort((a, b) => a.term.localeCompare(b.term));
      }
    }
    /* ----------------------------------------------------------
       FILTER INITIALISATION
    ---------------------------------------------------------- */
    function initializeFilters() {
      const uniqueCategories = [...new Set(allData.map(i => i.category).filter(Boolean))].sort();
      populatePills('category-filter-pills', uniqueCategories, 'category');
      const uniqueTypes = [...new Set(allData.map(i => i.type).filter(Boolean))].sort();
      populatePills('type-filter-pills', uniqueTypes, 'type');
      populatePills('meaning-type-filter-pills',
        ['technical/scientific', 'media theoretical/philosophical'], 'meaning-type');
    }
    function populatePills(containerId, values, type) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.classList.add('pill', 'active');
      allBtn.setAttribute('data-type', type);
      allBtn.setAttribute('data-value', 'all');
      allBtn.textContent = 'All';
      allBtn.addEventListener('click', handlePillClick);
      container.appendChild(allBtn);
      values.forEach(value => {
        if (!value || value === 'all') return;
        const btn = document.createElement('button');
        btn.classList.add('pill');
        btn.setAttribute('data-type', type);
        btn.setAttribute('data-value', value);
        btn.textContent = value;
        btn.addEventListener('click', handlePillClick);
        container.appendChild(btn);
      });
    }
    /* ----------------------------------------------------------
       PILL CLICK HANDLER
    ---------------------------------------------------------- */
    function handlePillClick(event) {
      const pill   = event.target;
      const value  = pill.getAttribute('data-value');
      const parent = pill.closest('.filter-pills');
      if (value === 'all') {
        parent.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
      } else {
        const allPill = parent.querySelector('.pill[data-value="all"]');
        if (allPill) allPill.classList.remove('active');
        pill.classList.toggle('active');
        if (!parent.querySelector('.pill.active')) {
          if (allPill) allPill.classList.add('active');
        }
      }
      filterTable();
    }
    /* ----------------------------------------------------------
       FILTER HELPERS
    ---------------------------------------------------------- */
    function toggleAllFilters(forceClose = false) {
      document.querySelectorAll('.filter-group').forEach(group => {
        if (!filtersActive || forceClose) group.classList.remove('active');
      });
      adjustContentViewHeight();
    }
    function getActivePillValues(type) {
      const activePills = document.querySelectorAll(`.pill[data-type="${type}"].active`);
      return Array.from(activePills).map(p => p.getAttribute('data-value').toLowerCase());
    }
    function applyAllFiltersToLiteratureItem(item, fromYear, toYear) {
      if (!filtersActive) return true;
      if (item.year !== null) {
        if (fromYear && item.year < fromYear) return false;
        if (toYear   && item.year > toYear)   return false;
      } else if (fromYear || toYear) {
        return false;
      }
      const catPills     = document.querySelectorAll('.pill[data-type="category"].active');
      const allCats      = Array.from(catPills).some(p => p.getAttribute('data-value') === 'all');
      const selectedCats = Array.from(catPills).map(p => p.getAttribute('data-value')).filter(v => v !== 'all');
      if (!allCats && !selectedCats.includes(item.category)) return false;
      const typePills     = document.querySelectorAll('.pill[data-type="type"].active');
      const allTypes      = Array.from(typePills).some(p => p.getAttribute('data-value') === 'all');
      const selectedTypes = Array.from(typePills).map(p => p.getAttribute('data-value')).filter(v => v !== 'all');
      if (!allTypes && !selectedTypes.includes(item.type)) return false;
      return true;
    }
    /* ----------------------------------------------------------
       RENDER — Table
    ---------------------------------------------------------- */
    function renderTable() {
      const tbody    = document.querySelector('table tbody');
      tbody.innerHTML = '';
      const fromYear = parseInt(document.getElementById('fromYearInput').value);
      const toYear   = parseInt(document.getElementById('toYearInput').value);
      const filtered = allData.filter(item =>
        applyAllFiltersToLiteratureItem(item, fromYear, toYear)
      );
      filtered.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.year}</td>
          <td>${item.title}</td>
          <td class="link-pill"><a href="${item.link}" target="_blank">Link</a></td>
          <td>${item.author}</td>
          <td>${item.platformPublisher}</td>
          <td>${item.category}</td>
          <td>${item.type}</td>
        `;
        tbody.appendChild(row);
      });
      updateFilterCount(filtered.length);
      requestAnimationFrame(syncTableHeaderWidths);
    }
    /* ----------------------------------------------------------
       RENDER — Quotes
    ---------------------------------------------------------- */
    function renderQuoteOnlyView() {
      const container = document.getElementById('quoteOnlyViewContainer');
      container.innerHTML = '';
      const fromYear = parseInt(document.getElementById('fromYearInput').value);
      const toYear   = parseInt(document.getElementById('toYearInput').value);
      const filtered = allData.filter(item =>
        item.quote && applyAllFiltersToLiteratureItem(item, fromYear, toYear)
      );
      if (filtered.length === 0) {
        container.innerHTML =
          '<p style="padding:20px;text-align:center;color:#666;">No quotes found matching the selected filters.</p>';
      } else {
        filtered.forEach(item => {
          const wrapper  = document.createElement('div');
          wrapper.classList.add('literature-quote-item');
          const quoteEl  = document.createElement('div');
          quoteEl.innerHTML = item.quote;
          const authorEl = document.createElement('div');
          authorEl.classList.add('quote-author');
          authorEl.textContent = [item.author, item.title || item.platformPublisher, item.year]
            .filter(Boolean).join(', ');
          wrapper.appendChild(quoteEl);
          wrapper.appendChild(authorEl);
          container.appendChild(wrapper);
        });
      }
      updateFilterCount(filtered.length);
    }
    /* ----------------------------------------------------------
       RENDER — Terms / Glossary
    ---------------------------------------------------------- */
    function renderTermsView() {
      const container = document.getElementById('termsViewContainer');
      container.innerHTML = '';
      if (currentOpenDefinitionElement) {
        currentOpenDefinitionElement.remove();
        currentOpenDefinitionElement = null;
      }
      const selectedMeaningTypes  = getActivePillValues('meaning-type');
      const allMeaningTypesActive = selectedMeaningTypes.includes('all');
      const filteredTerms = {};
      for (const letter in termsData) {
        const terms = termsData[letter].filter(t => {
          if (!filtersActive || allMeaningTypesActive) return true;
          return selectedMeaningTypes.includes(t.meaningType.toLowerCase());
        });
        if (terms.length > 0) filteredTerms[letter] = terms;
      }
      const sortedLetters    = Object.keys(filteredTerms).sort();
      const numColumns       = 4;
      const columns          = Array.from({ length: numColumns }, () => {
        const col = document.createElement('div');
        col.classList.add('term-column');
        return col;
      });
      let currentColumnIndex = 0;
      let displayedTermCount = 0;
      let foundTermElement   = null;
      sortedLetters.forEach(letter => {
        const letterHeader = document.createElement('div');
        letterHeader.classList.add('term-letter');
        letterHeader.textContent = letter;
        columns[currentColumnIndex].appendChild(letterHeader);
        filteredTerms[letter].forEach(termItem => {
          const termEl   = document.createElement('div');
          termEl.classList.add('term-item');
          termEl.textContent = termItem.term;
          termEl.setAttribute('data-term', termItem.term);
          const termSlug = slugify(termItem.term);
          termEl.id      = `glossary_${termSlug}`;
          const isTBA    = termItem.definition.trim().toLowerCase() === 'tba';
          if (isTBA) {
            termEl.classList.add('tba-term');
            termEl.style.cursor = 'default';
          } else {
            termEl.addEventListener('click', function () {
              handleTermActivation(this, termItem);
            });
          }
          columns[currentColumnIndex].appendChild(termEl);
          displayedTermCount++;
          if (termToActivateOnRender && termSlug === termToActivateOnRender) {
            foundTermElement = termEl;
          }
        });
        currentColumnIndex = (currentColumnIndex + 1) % numColumns;
      });
      columns.forEach(col => container.appendChild(col));
      if (foundTermElement) {
        const termName = foundTermElement.getAttribute('data-term');
        const letter   = termName.charAt(0).toUpperCase();
        const termItem = termsData[letter]?.find(i => slugify(i.term) === termToActivateOnRender);
        if (termItem) {
          handleTermActivation(foundTermElement, termItem);
          const headerHeight = document.getElementById('fixed-header-area').offsetHeight;
          container.scrollTo({
            top: foundTermElement.getBoundingClientRect().top + container.scrollTop - headerHeight,
            behavior: 'smooth'
          });
        }
        termToActivateOnRender = null;
      }
      updateFilterCount(displayedTermCount);
    }
    /* ----------------------------------------------------------
       FILTER TABLE (dispatcher)
    ---------------------------------------------------------- */
    function filterTable() {
      if      (currentView === 'table') renderTable();
      else if (currentView === 'quote') renderQuoteOnlyView();
      else if (currentView === 'terms') renderTermsView();
    }
    /* ----------------------------------------------------------
       STATS / COUNT DISPLAY
    ---------------------------------------------------------- */
    function updateFilterCount(filteredCount) {
      const statsDisplay = document.getElementById('statsDisplay');
      if (!statsDisplay) return;
      const cls      = 'article-count-number';
      const supStyle = 'font-size:0.5em;vertical-align:super;color:lightgrey;';
      const hasActiveLiteratureFilters =
        document.querySelectorAll('.pill.active[data-type="category"]:not([data-value="all"])').length > 0 ||
        document.querySelectorAll('.pill.active[data-type="type"]:not([data-value="all"])').length > 0    ||
        document.getElementById('fromYearInput').value !== ''                                             ||
        document.getElementById('toYearInput').value   !== '';
      const hasActiveTermsFilters =
        document.querySelectorAll('.pill.active[data-type="meaning-type"]:not([data-value="all"])').length > 0;
      if (currentView === 'table') {
        const total = allData.length;
        statsDisplay.innerHTML = (hasActiveLiteratureFilters && filtersActive)
          ? `Texts:<span class="${cls}">${filteredCount}</span><sup style="${supStyle}">/<span class="${cls}">${total}</span></sup>`
          : `Texts:<span class="${cls}">${total}</span>`;
      } else if (currentView === 'quote') {
        const totalQuotes = allData.filter(i => i.quote).length;
        statsDisplay.innerHTML = (hasActiveLiteratureFilters && filtersActive)
          ? `Quotes:<span class="${cls}">${filteredCount}</span><sup style="${supStyle}">/<span class="${cls}">${totalQuotes}</span></sup>`
          : `Quotes:<span class="${cls}">${totalQuotes}</span>`;
      } else if (currentView === 'terms') {
        const totalTerms = Object.values(termsData).flat().length;
        statsDisplay.innerHTML = (hasActiveTermsFilters && filtersActive)
          ? `Terms:<span class="${cls}">${filteredCount}</span><sup style="${supStyle}">/<span class="${cls}">${totalTerms}</span></sup>`
          : `Terms:<span class="${cls}">${totalTerms}</span>`;
      }
    }
  </script>
</body>
</html>
